<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface">Add Food</h1>
<div class="relative w-full max-w-2xl">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant z-10" data-icon="search">search</span>
<input class="w-full pl-12 pr-4 py-3 bg-surface-container rounded-xl border-none focus:ring-2 focus:ring-primary shadow-sm font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-shadow duration-200" placeholder="Search for food..." type="text"/>
</div>
</section>
<!-- Search Results (Simulated View) -->

<!-- Result 1 -->
<li class="p-md hover:bg-surface-container-low transition-colors cursor-pointer group">
<div class="flex justify-between items-center">
<div>
<p class="font-headline-md text-[18px] text-on-surface font-semibold group-hover:text-primary transition-colors">Greek Yogurt</p>
<p class="font-body-md text-on-surface-variant text-sm mt-xs">100g - 80 kcal</p>
</div>
<button class="w-10 h-10 rounded-full bg-surface-container-high text-primary flex items-center justify-center group-hover:bg-primary group-hover:text-on-primary transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</li>

<p class="font-headline-md text-[18px] text-primary font-bold">Apple</p>
<p class="font-body-md text-on-surface-variant text-sm mt-xs">Medium (182g) - 95 kcal</p>
</div>

<span class="material-symbols-outlined text-sm" data-icon="close">close</span>
</button>
</div>

</div>
<div class="relative">
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Meal Category</label>

<option>Lunch</option>
