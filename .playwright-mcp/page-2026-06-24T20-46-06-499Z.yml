        - article [ref=e70]:
          - heading "CaloriQ" [level=1] [ref=e71]
          - paragraph [ref=e72]:
            - strong [ref=e73]: CaloriQ
            - text: is a free, full-stack single-page application for tracking daily nutrition and calories — built as a course project at Code Platoon.
          - separator [ref=e74]
          - heading "What is CaloriQ?" [level=2] [ref=e75]
          - paragraph [ref=e76]: "CaloriQ tackles one of the most common barriers to healthy eating: the lack of a simple, free tool to track daily nutrition. Most calorie tracking apps hide essential features — macro breakdowns, meal history, and goal tracking — behind expensive subscriptions."
          - paragraph [ref=e77]: "CaloriQ provides a focused nutrition tracking experience where users can:"
          - list [ref=e78]:
            - listitem [ref=e79]: Search for foods using the Open Food Facts API
            - listitem [ref=e80]: Log meals across Breakfast, Lunch, Dinner, and Snacks
            - listitem [ref=e81]: Track calories and macronutrients (protein, carbs, fat)
            - listitem [ref=e82]: Set and monitor daily calorie goals
            - listitem [ref=e83]: Visualize weekly nutrition trends
            - listitem [ref=e84]: Support the project via a one-time Stripe donation
          - separator [ref=e85]
          - heading "Why CaloriQ?" [level=2] [ref=e86]
          - paragraph [ref=e87]: The fitness app market is dominated by subscription-gated products. Free tiers on apps like MyFitnessPal are intentionally limited. CaloriQ's core belief is that basic, personal nutrition data shouldn't cost a monthly fee to access.
          - separator [ref=e88]
          - heading "Live App" [level=2] [ref=e89]
