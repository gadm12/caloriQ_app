        - article [ref=e64]:
          - heading "CaloriQ" [level=1] [ref=e65]
          - paragraph [ref=e66]:
            - strong [ref=e67]: CaloriQ
            - text: is a free, full-stack single-page application for tracking daily nutrition and calories — built as a course project at Code Platoon.
          - separator [ref=e68]
          - heading "What is CaloriQ?" [level=2] [ref=e69]
          - paragraph [ref=e70]: "CaloriQ tackles one of the most common barriers to healthy eating: the lack of a simple, free tool to track daily nutrition. Most calorie tracking apps hide essential features — macro breakdowns, meal history, and goal tracking — behind expensive subscriptions."
          - paragraph [ref=e71]: "CaloriQ provides a focused nutrition tracking experience where users can:"
          - list [ref=e72]:
            - listitem [ref=e73]: Search for foods using the Open Food Facts API
            - listitem [ref=e74]: Log meals across Breakfast, Lunch, Dinner, and Snacks
            - listitem [ref=e75]: Track calories and macronutrients (protein, carbs, fat)
            - listitem [ref=e76]: Set and monitor daily calorie goals
            - listitem [ref=e77]: Visualize weekly nutrition trends
            - listitem [ref=e78]: Support the project via a one-time Stripe donation
          - separator [ref=e79]
          - heading "Why CaloriQ?" [level=2] [ref=e80]
          - paragraph [ref=e81]: The fitness app market is dominated by subscription-gated products. Free tiers on apps like MyFitnessPal are intentionally limited. CaloriQ's core belief is that basic, personal nutrition data shouldn't cost a monthly fee to access.
