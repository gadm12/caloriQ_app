        - article [ref=e76]:
          - heading "CaloriQ" [level=1] [ref=e77]
          - paragraph [ref=e78]:
            - strong [ref=e79]: CaloriQ
            - text: is a free, full-stack single-page application for tracking daily nutrition and calories — built as a course project at Code Platoon.
          - separator [ref=e80]
          - heading "What is CaloriQ?" [level=2] [ref=e81]
          - paragraph [ref=e82]: "CaloriQ tackles one of the most common barriers to healthy eating: the lack of a simple, free tool to track daily nutrition. Most calorie tracking apps hide essential features — macro breakdowns, meal history, and goal tracking — behind expensive subscriptions."
          - paragraph [ref=e83]: "CaloriQ provides a focused nutrition tracking experience where users can:"
          - list [ref=e84]:
            - listitem [ref=e85]: Search for foods using the Open Food Facts API
            - listitem [ref=e86]: Log meals across Breakfast, Lunch, Dinner, and Snacks
            - listitem [ref=e87]: Track calories and macronutrients (protein, carbs, fat)
            - listitem [ref=e88]: Set and monitor daily calorie goals
            - listitem [ref=e89]: Visualize weekly nutrition trends
            - listitem [ref=e90]: Support the project via a one-time Stripe donation
          - separator [ref=e91]
          - heading "Why CaloriQ?" [level=2] [ref=e92]
          - paragraph [ref=e93]: The fitness app market is dominated by subscription-gated products. Free tiers on apps like MyFitnessPal are intentionally limited. CaloriQ's core belief is that basic, personal nutrition data shouldn't cost a monthly fee to access.
