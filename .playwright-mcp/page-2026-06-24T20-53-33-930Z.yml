        - article [ref=e69]:
          - heading "CaloriQ" [level=1] [ref=e70]
          - paragraph [ref=e71]:
            - strong [ref=e72]: CaloriQ
            - text: is a free, full-stack single-page application for tracking daily nutrition and calories — built as a course project at Code Platoon.
          - separator [ref=e73]
          - heading "What is CaloriQ?" [level=2] [ref=e74]
          - paragraph [ref=e75]: "CaloriQ tackles one of the most common barriers to healthy eating: the lack of a simple, free tool to track daily nutrition. Most calorie tracking apps hide essential features — macro breakdowns, meal history, and goal tracking — behind expensive subscriptions."
          - paragraph [ref=e76]: "CaloriQ provides a focused nutrition tracking experience where users can:"
          - list [ref=e77]:
            - listitem [ref=e78]: Search for foods using the Open Food Facts API
            - listitem [ref=e79]: Log meals across Breakfast, Lunch, Dinner, and Snacks
            - listitem [ref=e80]: Track calories and macronutrients (protein, carbs, fat)
            - listitem [ref=e81]: Set and monitor daily calorie goals
            - listitem [ref=e82]: Visualize weekly nutrition trends
            - listitem [ref=e83]: Support the project via a one-time Stripe donation
          - separator [ref=e84]
          - heading "Why CaloriQ?" [level=2] [ref=e85]
          - paragraph [ref=e86]: The fitness app market is dominated by subscription-gated products. Free tiers on apps like MyFitnessPal are intentionally limited. CaloriQ's core belief is that basic, personal nutrition data shouldn't cost a monthly fee to access.
          - separator [ref=e87]
