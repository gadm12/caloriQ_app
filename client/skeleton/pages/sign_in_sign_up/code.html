<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CaloriQ - Sign In</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-primary": "#ffffff",
                      "tertiary-fixed-dim": "#ffb95f",
                      "on-surface": "#0b1c30",
                      "on-primary-container": "#00574d",
                      "inverse-primary": "#3cddc7",
                      "secondary-fixed": "#89f5e7",
                      "on-tertiary-fixed": "#2a1700",
                      "error-container": "#ffdad6",
                      "tertiary": "#855300",
                      "on-error": "#ffffff",
                      "surface-container-highest": "#d3e4fe",
                      "on-tertiary-container": "#6d4400",
                      "on-secondary": "#ffffff",
                      "secondary": "#006a61",
                      "surface-tint": "#006b5f",
                      "surface-container-high": "#dce9ff",
                      "surface-dim": "#cbdbf5",
                      "on-primary-fixed-variant": "#005047",
                      "on-primary-fixed": "#00201c",
                      "on-tertiary": "#ffffff",
                      "on-background": "#0b1c30",
                      "primary-fixed-dim": "#3cddc7",
                      "on-surface-variant": "#3c4a46",
                      "outline-variant": "#bacac5",
                      "surface-bright": "#f8f9ff",
                      "primary": "#006b5f",
                      "inverse-surface": "#213145",
                      "primary-fixed": "#62fae3",
                      "surface-variant": "#d3e4fe",
                      "primary-container": "#2dd4bf",
                      "tertiary-fixed": "#ffddb8",
                      "on-error-container": "#93000a",
                      "inverse-on-surface": "#eaf1ff",
                      "on-secondary-fixed-variant": "#005049",
                      "on-secondary-fixed": "#00201d",
                      "on-secondary-container": "#006f66",
                      "surface": "#f8f9ff",
                      "secondary-container": "#86f2e4",
                      "surface-container-lowest": "#ffffff",
                      "secondary-fixed-dim": "#6bd8cb",
                      "surface-container-low": "#eff4ff",
                      "outline": "#6b7a76",
                      "surface-container": "#e5eeff",
                      "background": "#f8f9ff",
                      "error": "#ba1a1a",
                      "tertiary-container": "#ffad3a",
                      "on-tertiary-fixed-variant": "#653e00"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "lg": "24px",
                      "sm": "8px",
                      "base": "4px",
                      "md": "16px",
                      "xs": "4px",
                      "gutter": "20px",
                      "xl": "48px",
                      "container-max": "1200px"
              },
              "fontFamily": {
                      "stats-number": ["Plus Jakarta Sans"],
                      "headline-lg-mobile": ["Plus Jakarta Sans"],
                      "body-lg": ["Inter"],
                      "headline-lg": ["Plus Jakarta Sans"],
                      "display-lg": ["Plus Jakarta Sans"],
                      "label-md": ["Inter"],
                      "headline-md": ["Plus Jakarta Sans"],
                      "body-md": ["Inter"]
              },
              "fontSize": {
                      "stats-number": ["20px", { "lineHeight": "24px", "fontWeight": "700" }],
                      "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "700" }],
                      "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                      "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                      "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                      "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                      "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                      "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }]
              }
            }
          }
        }
    </script>
<style>
        /* Custom floating label transitions */
        .peer:focus ~ label,
        .peer:not(:placeholder-shown) ~ label {
            transform: translateY(-1.5rem) scale(0.75);
            color: theme('colors.primary');
        }
        
        /* Subtle animated background pattern */
        .bg-pattern {
            background-image: radial-gradient(theme('colors.surface-variant') 1px, transparent 1px);
            background-size: 24px 24px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-lg relative overflow-x-hidden">
<!-- Atmospheric Background -->
<div class="absolute inset-0 bg-pattern opacity-50 z-0 pointer-events-none"></div>
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[800px] bg-primary/5 rounded-full blur-3xl z-0 pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-md py-xl z-10 w-full max-w-container-max mx-auto">
<!-- Brand Header -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center bg-surface-container-lowest w-16 h-16 rounded-2xl shadow-sm border border-outline-variant/30 mb-md">
<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">nutrition</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">CaloriQ</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-sm max-w-[280px] mx-auto">Your expert companion for nutritional vitality.</p>
</div>
<!-- Auth Card Cluster -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-sm border border-outline-variant/50 p-lg md:p-[32px] relative overflow-hidden backdrop-blur-sm">
<!-- Tabs Toggle -->
<div class="flex bg-surface-container-low rounded-lg p-1 mb-xl relative">
<div class="absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-surface-container-lowest rounded-md shadow-sm transition-transform duration-300 ease-in-out" id="tab-indicator"></div>
<button class="flex-1 py-2 font-label-md text-label-md text-primary relative z-10 transition-colors duration-300" id="tab-signin" onclick="switchTab('signin')">
                    Sign In
                </button>
<button class="flex-1 py-2 font-label-md text-label-md text-on-surface-variant hover:text-on-surface relative z-10 transition-colors duration-300" id="tab-signup" onclick="switchTab('signup')">
                    Sign Up
                </button>
</div>
<form class="space-y-md" id="auth-form">
<!-- Full Name Field (Sign Up Only) -->
<div class="relative z-0 w-full mb-md group hidden opacity-0 transition-opacity duration-300" id="field-fullname">
<input class="block py-3 px-0 w-full font-body-md text-body-md text-on-surface bg-transparent border-0 border-b-2 border-outline-variant appearance-none focus:outline-none focus:ring-0 focus:border-primary peer transition-colors" id="fullname" name="fullname" placeholder=" " type="text"/>
<label class="absolute font-body-md text-body-md text-on-surface-variant duration-300 transform top-3 -z-10 origin-[0] peer-focus:font-label-md" for="fullname">Full Name</label>
</div>
<!-- Email Field -->
<div class="relative z-0 w-full mb-md group">
<input class="block py-3 px-0 w-full font-body-md text-body-md text-on-surface bg-transparent border-0 border-b-2 border-outline-variant appearance-none focus:outline-none focus:ring-0 focus:border-primary peer transition-colors" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute font-body-md text-body-md text-on-surface-variant duration-300 transform top-3 -z-10 origin-[0] peer-focus:font-label-md" for="email">Email Address</label>
</div>
<!-- Password Field -->
<div class="relative z-0 w-full mb-md group">
<input class="block py-3 px-0 w-full font-body-md text-body-md text-on-surface bg-transparent border-0 border-b-2 border-outline-variant appearance-none focus:outline-none focus:ring-0 focus:border-primary peer transition-colors" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute font-body-md text-body-md text-on-surface-variant duration-300 transform top-3 -z-10 origin-[0] peer-focus:font-label-md" for="password">Password</label>
</div>
<!-- Confirm Password Field (Sign Up Only) -->
<div class="relative z-0 w-full mb-md group hidden opacity-0 transition-opacity duration-300" id="field-confirm-password">
<input class="block py-3 px-0 w-full font-body-md text-body-md text-on-surface bg-transparent border-0 border-b-2 border-outline-variant appearance-none focus:outline-none focus:ring-0 focus:border-primary peer transition-colors" id="confirm_password" name="confirm_password" placeholder=" " type="password"/>
<label class="absolute font-body-md text-body-md text-on-surface-variant duration-300 transform top-3 -z-10 origin-[0] peer-focus:font-label-md" for="confirm_password">Confirm Password</label>
</div>
<!-- Forgot Password Link (Sign In Only) -->
<div class="flex justify-end pt-sm pb-md transition-opacity duration-300" id="forgot-password">
<a class="font-label-md text-label-md text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Action Button -->
<button class="w-full bg-primary text-on-primary font-label-md text-label-md py-3 px-6 rounded-lg shadow-sm hover:shadow-md hover:bg-surface-tint transition-all active:scale-[0.98] relative overflow-hidden group mt-md" id="btn-submit" type="button">
<span class="relative z-10" id="btn-text">Sign In</span>
<!-- Tactile hover effect -->
<div class="absolute inset-0 bg-white/10 transform scale-x-0 group-hover:scale-x-100 transition-transform origin-left duration-300"></div>
</button>
</form>
<!-- Contextual separator -->
<div class="mt-xl flex items-center justify-center space-x-4">
<span class="h-px bg-outline-variant w-full"></span>
<span class="font-label-md text-label-md text-on-surface-variant whitespace-nowrap">Secure Access</span>
<span class="h-px bg-outline-variant w-full"></span>
</div>
</div>
</main>
<!-- Footer Component (From JSON) -->
<div class="w-full px-md pb-md z-10">
<footer class="w-full rounded-lg bg-tertiary-container shadow-sm flex flex-col md:flex-row items-center justify-center gap-md p-lg max-w-container-max mx-auto text-center">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-on-tertiary-container" style="font-variation-settings: 'FILL' 0;">volunteer_activism</span>
<span class="font-body-md text-body-md text-on-tertiary-container">Help fight hunger around the world</span>
</div>
<a class="underline font-bold text-on-tertiary-container font-label-md text-label-md hover:opacity-90 transition-opacity hover:scale-[0.98] active:scale-[0.98]" href="#">Donate Now</a>
</footer>
</div>
<!-- Interactive Logic -->
<script>
        function switchTab(mode) {
            const isSignIn = mode === 'signin';
            
            // UI Elements
            const tabIndicator = document.getElementById('tab-indicator');
            const tabSignIn = document.getElementById('tab-signin');
            const tabSignUp = document.getElementById('tab-signup');
            
            const fieldFullName = document.getElementById('field-fullname');
            const fieldConfirmPassword = document.getElementById('field-confirm-password');
            const forgotPassword = document.getElementById('forgot-password');
            const btnText = document.getElementById('btn-text');

            if (isSignIn) {
                // Tab styling
                tabIndicator.style.transform = 'translateX(0)';
                tabSignIn.classList.add('text-primary');
                tabSignIn.classList.remove('text-on-surface-variant');
                tabSignUp.classList.remove('text-primary');
                tabSignUp.classList.add('text-on-surface-variant');
                
                // Form logic
                fieldFullName.classList.add('hidden');
                fieldFullName.classList.remove('opacity-100');
                fieldFullName.classList.add('opacity-0');
                
                fieldConfirmPassword.classList.add('hidden');
                fieldConfirmPassword.classList.remove('opacity-100');
                fieldConfirmPassword.classList.add('opacity-0');
                
                forgotPassword.classList.remove('hidden');
                setTimeout(() => forgotPassword.classList.add('opacity-100'), 10);
                
                btnText.textContent = 'Sign In';
            } else {
                // Tab styling
                tabIndicator.style.transform = 'translateX(100%)';
                tabSignUp.classList.add('text-primary');
                tabSignUp.classList.remove('text-on-surface-variant');
                tabSignIn.classList.remove('text-primary');
                tabSignIn.classList.add('text-on-surface-variant');
                
                // Form logic
                fieldFullName.classList.remove('hidden');
                setTimeout(() => fieldFullName.classList.add('opacity-100'), 10);
                
                fieldConfirmPassword.classList.remove('hidden');
                setTimeout(() => fieldConfirmPassword.classList.add('opacity-100'), 10);
                
                forgotPassword.classList.remove('opacity-100');
                setTimeout(() => forgotPassword.classList.add('hidden'), 300);
                
                btnText.textContent = 'Create Account';
            }
        }
    </script>
</body></html>
